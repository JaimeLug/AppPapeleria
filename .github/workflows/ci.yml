name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.4'
          channel: stable

      - name: Instalar dependencias
        run: flutter pub get

      - name: Análisis estático
        run: flutter analyze

      - name: Pruebas
        run: flutter test
